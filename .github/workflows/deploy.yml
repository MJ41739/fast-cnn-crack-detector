name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Backend Checks
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest httpx
          # Install requirements in CPU-only mode for tests
          pip install --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Lint Backend (Flake8)
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Backend Tests
        run: |
          pytest --maxfail=2 -v

      # Frontend Checks
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Check Frontend Build
        working-directory: ./frontend
        run: npm run build

  deploy-backend:
    needs: test-and-lint
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Filter and Prepare Hugging Face Assets
        run: |
          mkdir -p dist_hf/checkpoints
          cp -r backend dist_hf/
          cp -r models dist_hf/
          cp -r utils dist_hf/
          cp Dockerfile dist_hf/
          cp requirements.txt dist_hf/
          
          # Copy only the small, optimized weights required for inference
          if [ -f checkpoints/custom_cnn_quantized.onnx ]; then
            cp checkpoints/custom_cnn_quantized.onnx dist_hf/checkpoints/
          fi
          if [ -f checkpoints/custom_cnn.onnx ]; then
            cp checkpoints/custom_cnn.onnx dist_hf/checkpoints/
          fi
          if [ -f checkpoints/custom_cnn_best.pth ]; then
            cp checkpoints/custom_cnn_best.pth dist_hf/checkpoints/
          fi

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_PATH: ${{ secrets.HF_SPACE_PATH }} # e.g. "username/space-name"
        run: |
          cd dist_hf
          git init
          git checkout -b main
          git config --global user.email "deploy@github-actions.com"
          git config --global user.name "CI-CD Bot"
          git add -A
          git commit -m "deploy: update spaces container"
          
          # Force push to the Space repository
          git remote add hf https://deploy-bot:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE_PATH
          git push --force hf main
