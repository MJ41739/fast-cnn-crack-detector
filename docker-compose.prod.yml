services:
  backend-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crack-detection-backend-prod
    ports:
      - "7860:7860"
    environment:
      - DEVICE=cpu
      - ACTIVE_MODEL_NAME=onnx_quantized
      - APP_NAME=Crack Detection System (Production)
    restart: unless-stopped
